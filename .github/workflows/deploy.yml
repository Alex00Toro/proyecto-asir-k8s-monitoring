name: Build and Push to GCP

on:
  push:
    branches: [ main ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Google Auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: Docker Auth
        run: gcloud auth configure-docker europe-southwest1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t europe-southwest1-docker.pkg.dev/proyecto-asir-monitorizacion/repo-asir/app-estres:latest .
          docker push europe-southwest1-docker.pkg.dev/proyecto-asir-monitorizacion/repo-asir/app-estres:latest
